services:
  n8n:
    image: n8nio/n8n:2.30.7
    container_name: homelab-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n.${DOMAIN_BASE}
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://n8n.${DOMAIN_BASE}/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_FOLDER=/data
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=homelab-n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_POSTGRES_DB}
      - DB_POSTGRESDB_USER=${N8N_POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${N8N_POSTGRES_PASSWORD}
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=336
      - GENERIC_TIMEZONE=${TZ}
      - N8N_SECURE_COOKIE=false
    volumes:
      - /Volumes/homelab_data/homelab/data/n8n/files:/data
    depends_on:
      n8n-postgres:
        condition: service_healthy
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN_BASE}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  n8n-postgres:
    image: postgres:16-alpine
    container_name: homelab-n8n-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${N8N_POSTGRES_DB}
      - POSTGRES_USER=${N8N_POSTGRES_USER}
      - POSTGRES_PASSWORD=${N8N_POSTGRES_PASSWORD}
    volumes:
      - /Volumes/homelab_data/homelab/data/n8n/database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_POSTGRES_USER} -d ${N8N_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homelab
